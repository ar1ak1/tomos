services:
  db:
    image: postgres:18-alpine
    container_name: tomos-db
    ports:
      - '15432:5432'
    environment:
      POSTGRES_DB: tomos
      POSTGRES_USER: tomos
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tomos -d tomos']
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: tomos-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  pgdata:
